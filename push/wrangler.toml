name = "ligen-push"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Cron: jede Minute Live-Spiele pruefen. Der Worker nutzt sub:index statt KV.list(),
# damit das kostenlose Cloudflare-KV-List-Limit nicht taeglich erreicht wird.
[triggers]
crons = ["* * * * *"]

# KV speichert Push-Abos (sub:<hash>), den Abo-Index (sub:index) und die zuletzt gesehenen Spielstaende (scores).
# id nach  `npx wrangler kv namespace create SUBS`  hier eintragen.
[[kv_namespaces]]
binding = "SUBS"
id = "d58846d861ff498bafa823cdc33511bf"

